<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ting Hao | Personal Page</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg-1: #0f172a;
            --color-bg-2: #312e81;
            --color-bg-3: #4c1d95;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg-1);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Gradient Background */
        .background-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #0f172a, #1e1b4b, #312e81, #4c1d95, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            z-index: -2;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            top: 10%;
            left: 20%;
            animation-duration: 8s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            bottom: 10%;
            right: 15%;
            animation-duration: 12s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #d946ef;
            top: 40%;
            left: 60%;
            animation-duration: 10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            padding: 3rem 4rem;
            text-align: center;
            max-width: 90%;
            width: 500px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
        }

        /* Typography & Content */
        .name {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            
            /* Purple Gradient Shimmer */
            background: linear-gradient(to right, #e0e7ff 0%, #a78bfa 20%, #e0e7ff 40%, #e0e7ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        .date {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 500;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
        }

        .clock {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.4s forwards;
            line-height: 1;
        }

        .clock span {
            display: inline-block;
            min-width: 0.6em;
        }

        .clock .separator {
            opacity: 0.5;
            animation: blink 1s infinite;
            min-width: auto;
            margin: 0 0.1em;
        }

        /* Animations */
        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blink {
            50% { opacity: 0.2; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .glass-card {
                padding: 2rem;
                width: 90%;
            }

            .name {
                font-size: 2.5rem;
            }

            .clock {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="background-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main Content -->
    <main class="glass-card">
        <h1 class="name">Ting Hao</h1>
        <div class="date" id="date">Loading date...</div>
        <div class="clock" id="clock">
            <span id="hours">00</span><span class="separator">:</span><span id="minutes">00</span><span class="separator">:</span><span id="seconds">00</span>
        </div>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Update Date
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('date').textContent = dateString;

            // Update Clock
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        // Run immediately and then every second
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
